<!DOCTYPE html>
<html>

<head>

<title>NextGen Daycare</title>

<style>

body{
font-family:Arial;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.section{
padding:40px;
text-align:center;
}

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.gallery img{
width:250px;
border-radius:8px;
}

form{
max-width:500px;
margin:auto;
}

input, textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#2e7d32;
color:white;
padding:10px 20px;
border:none;
}

</style>

</head>

<body>

<header>

<h1>NextGen Daycare</h1>

<p>Safe, nurturing and play-based early learning</p>

</header>

<section class="section">

<h2>About Our Daycare</h2>

<p>
Our daycare provides a safe and nurturing environment where
children can learn through play, creativity, and exploration.
</p>

</section>

<section class="section">

<h2>Photo Gallery</h2>

<div class="gallery">

<img src="gallery1.jpg">
<img src="gallery2.jpg">
<img src="gallery3.jpg">
<img src="gallery4.jpg">

</div>

</section>

<section class="section">

<h2>Register for Daycare</h2>

<form>

<input type="text" placeholder="Parent Name">

<input type="text" placeholder="Child Name">

<input type="number" placeholder="Child Age">

<input type="email" placeholder="Email">

<input type="tel" placeholder="Phone">

<button type="submit">Register</button>

</form>

</section>

<section class="section">

<h2>Join Our Waitlist</h2>

<form>

<input type="text" placeholder="Parent Name">

<input type="text" placeholder="Child Name">

<input type="number" placeholder="Child Age">

<input type="email" placeholder="Email">

<textarea placeholder="Additional information"></textarea>

<button type="submit">Join Waitlist</button>

</form>

</section>

</body>

</html>
